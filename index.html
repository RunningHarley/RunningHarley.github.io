    <script>

            },
            skills: [
                { icon: "💻", name: "前端开发", tech: "HTML, CSS, JavaScript, React, Vue", level: 85 },
                { icon: "⚙️", name: "后端开发", tech: "Python, Node.js, Go, 数据库", level: 75 },

                { icon: "🛠️", name: "工具", tech: "Git, Docker, Linux, VS Code", level: 80 }

                { title: "更多项目", desc: "敬请期待...", tech: "Coming Soon", link: "#" }

    <!-- ============================================ -->

    <!-- 粒子背景 Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- 鼠标光晕 -->
    <div id="cursor-glow"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">&lt;Harley/&gt;</div>
        <ul class="nav-links">
            <li><a href="#home">~/首页</a></li>
            <li><a href="#about">~/关于</a></li>
            <li><a href="#skills">~/技能</a></li>
            <li><a href="#projects">~/作品</a></li>
            <li><a href="#contact">~/联系</a></li>
        </ul>
    </nav>

    <!-- 首页 Hero -->
    <section id="home" class="hero">
        <div class="hero-content">
            <p class="greeting">$ hello_world</p>
            <h1 class="name glitch" data-text="Harley">Harley</h1>
            <p class="tagline">全栈开发者 | 极客 | 创造者</p>

            <!-- 终端打字机 -->
            <div class="terminal">
                <div class="terminal-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="terminal-title">bash -- Harley</span>
                </div>
                <div class="terminal-body" id="terminal-output"></div>
            </div>

            <a href="#about" class="btn-neon">了解更多 →</a>
        </div>
        <div class="scroll-indicator">
            <span>scroll</span>
            <div class="arrow"></div>
        </div>
    </section>

    <!-- 关于我 -->
    <section id="about" class="section">
        <h2 class="section-title"><span class="bracket">[</span> 关于我 <span class="bracket">]</span></h2>
        <div class="about-card glass">
            <div class="avatar">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Harley" alt="头像">
            </div>
            <div class="about-text">
                <h3>你好！我是 Harley</h3>
                <p>我是一名热爱技术的开发者，喜欢探索新技术，挑战自我。我致力于创造美观、实用的应用和网站。</p>

        </div>

    <!-- 技能展示 -->
    <section id="skills" class="section">
        <h2 class="section-title"><span class="bracket">[</span> 技能栈 <span class="bracket">]</span></h2>
        <div class="skills-grid" id="skills-grid">
            <!-- JS 动态渲染 -->
        </div>
    </section>

    <!-- 作品集 -->
    <section id="projects" class="section">
        <h2 class="section-title"><span class="bracket">[</span> 作品集 <span class="bracket">]</span></h2>
        <div class="projects-grid" id="projects-grid">
            <!-- JS 动态渲染 -->
        </div>
    </section>

    <!-- 联系我 -->
    <section id="contact" class="section">
        <h2 class="section-title"><span class="bracket">[</span> 联系我 <span class="bracket">]</span></h2>
        <div class="contact-content glass">
            <p>有问题或想合作？随时联系我！</p>
            <div class="social-links" id="social-links">
                <!-- JS 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <p id="footer-text">© 2026 Harley. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
